name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build backend with PyInstaller
        run: uv run pyinstaller backend.spec --distpath dist/backend --workpath C:\Temp\pyinstaller-work --noconfirm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package Windows installer
        working-directory: frontend
        run: ./node_modules/.bin/electron-builder --win --publish never --config.directories.output=..\dist-win

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist-win/*.exe
            dist-win/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Matchbox-Windows
          path: |
            dist-win/*.exe
            dist-win/*.zip
          retention-days: 14
